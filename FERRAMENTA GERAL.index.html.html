<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<title>Dashboard Unificado</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  display:flex;
  height:100vh;
  overflow:hidden;
  background:#f1f5f9;
}

.sidebar {
  width: 260px;
  background:#0f172a;
  color:#fff;
  display:flex;
  flex-direction:column;
  transition: width .25s ease;
  box-shadow:3px 0 6px rgba(0,0,0,.2);
}

.sidebar.collapsed { width: 78px; }

.toggle-btn {
  background:none;
  border:none;
  color:#fff;
  font-size:22px;
  cursor:pointer;
  padding:14px;
}

.toggle-btn:hover { background:#1e293b; }

h2 {
  text-align:center;
  margin:10px 0 16px;
  font-size:18px;
}

.category {
  font-size:12px;
  padding:8px 20px;
  text-transform:uppercase;
  color:#94a3b8;
}

.menu-btn, .submenu-btn {
  padding:12px 18px;
  border:none;
  background:none;
  color:#cbd5e1;
  text-align:left;
  font-size:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
}

.menu-btn:hover, .submenu-btn:hover {
  background:#1e293b;
  color:#fff;
}

.menu-btn.active, .submenu-btn.active {
  background:#334155;
  color:#fff;
  font-weight:700;
}

.menu-icon { font-size:20px; width:24px; }

.submenu {
  display:none;
  flex-direction:column;
  margin-left:10px;
  border-left:2px solid #1e293b;
}

.submenu.show { display:flex; }

.content { flex:1; }
iframe { width:100%; height:100%; border:none; }
</style>

</head>
<body>

<div class="sidebar" id="sidebar">

<button class="toggle-btn" id="toggleBtn">☰</button>

<h2>Dashboards</h2>

<div class="category">Operações</div>

<button class="menu-btn" id="toggleIndicadores">
  <span class="menu-icon">📁</span>
  Indicadores
</button>

<div class="submenu show" id="submenuIndicadores">
  <button class="submenu-btn" data-url="Dashbord de produção.html">🏭 Produção</button>
  <button class="submenu-btn" data-url="BACKLOG.html">📊 Backlog</button>
  <button class="submenu-btn" data-url="iNDICADOR PERECIVEL.html">🛫 Perecível</button>
  <button class="submenu-btn" data-url="Indicador_SALA_COFRE_atualizado.html">🗄️ Sala Cofre</button>
  <button class="submenu-btn active" data-url="Batimento de estoque.html">📈 Batimento de estoque</button>
</div>

<div class="category">Ferramentas</div>

<button class="menu-btn" id="toggleFerramentas">
  <span class="menu-icon">🧰</span>
  Utilitários
</button>

<div class="submenu" id="submenuFerramentas">

  <button class="submenu-btn" data-url="CICLICO_PORTA_PORTA_SEM_BORDA2.html">📦 Impressão Cíclico</button>
  <button class="submenu-btn" data-url="CICLICO ALM51.html">📦 Cíclico ALM51</button>
  <button class="submenu-btn" data-url="ferramenta_de_inventario_travada.html">🧮 Ferramenta de Inventário</button>
  <button class="submenu-btn" data-url="PORTA-PORTA.html">🚪 Inventário Porta–Porta</button>

  <!-- CONTENÇÃO NOVA -->
  <button class="submenu-btn" data-url="Contencão atualizada.html">📊 MP – Contenção</button>

  <!-- RECE ATUALIZADO -->
  <button class="submenu-btn" data-url="RECE1 REC2.html">📦 RECE 1 x RECE 2</button>

  <!-- DEVOLUÇÃO -->
  <button class="submenu-btn" data-url="DEVOLUÇÃO V3.html">↩️ Devolução</button>

</div>

</div>

<div class="content">
  <iframe id="frame" src="Batimento de estoque.html"></iframe>
</div>

<script>

const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('toggleBtn');
const frame = document.getElementById('frame');

const toggleIndicadores = document.getElementById('toggleIndicadores');
const submenuIndicadores = document.getElementById('submenuIndicadores');

const toggleFerramentas = document.getElementById('toggleFerramentas');
const submenuFerramentas = document.getElementById('submenuFerramentas');

const allSubmenuButtons = document.querySelectorAll('.submenu-btn');

toggleBtn.addEventListener('click', () => {
  sidebar.classList.toggle('collapsed');
});

toggleIndicadores.addEventListener('click', () => {
  submenuIndicadores.classList.toggle('show');
});

toggleFerramentas.addEventListener('click', () => {
  submenuFerramentas.classList.toggle('show');
});

allSubmenuButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    allSubmenuButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    frame.src = btn.dataset.url;
  });
});

</script>

</body>
</html>
